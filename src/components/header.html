<header class="site-header">
  <div class="container site-header__inner">

    <a href="/" class="site-header__wordmark" aria-label="Dave Cummings — home">
      <span class="wm-dave">Dave</span><span class="wm-cummings">Cummings</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <a href="/" class="site-nav__link">Home</a>
      <a href="/services/" class="site-nav__link">Services</a>
      <a href="/about/" class="site-nav__link">About</a>
      <a href="/contact/" class="site-nav__link">Contact</a>
    </nav>

    <div class="site-header__actions">
      <button
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Toggle dark mode"
        aria-pressed="false"
      >
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="/contact/" class="btn btn-outline btn-sm site-header__cta">Let's chat</a>
    </div>

  </div>
</header>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');

    function sync() {
      var dark = document.documentElement.dataset.theme === 'dark';
      btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
    }

    sync();

    btn.addEventListener('click', function () {
      var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('dc-theme', next);
      sync();
    });
  })();
</script>

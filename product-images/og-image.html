<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OG Image - Dave Cummings</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;width:1200px;height:630px;background:#0F172A;overflow:hidden;display:flex;align-items:center;box-sizing:border-box;padding:80px 96px;">

    <!-- Left: text content -->
    <div style="display:flex;flex-direction:column;justify-content:center;gap:0;flex:1;">

        <!-- DC monogram -->
        <div style="margin-bottom:36px;">
            <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="48" cy="48" r="44" stroke="#e20f2e" stroke-width="3"/>
                <text x="48" y="62" font-family="Space Grotesk, Arial, sans-serif" font-weight="800" font-size="32" fill="white" text-anchor="middle" letter-spacing="-1">DC</text>
            </svg>
        </div>

        <!-- Name -->
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:80px;color:#FFFFFF;line-height:1;letter-spacing:-3px;margin-bottom:24px;">
            Dave Cummings
        </div>

        <!-- Tagline -->
        <div style="font-family:'Inter',sans-serif;font-weight:500;font-size:30px;color:#94A3B8;line-height:1.4;margin-bottom:40px;letter-spacing:-0.3px;">
            Web Consultant &nbsp;·&nbsp; Performance, SEO &amp; Visibility
        </div>

        <!-- Domain -->
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#e20f2e;letter-spacing:-0.5px;margin-bottom:36px;">
            davecummings.co
        </div>

        <!-- CTA pill -->
        <div style="display:inline-flex;align-items:center;gap:10px;background:#e20f2e;color:white;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;padding:14px 28px;border-radius:50px;letter-spacing:-0.3px;">
            Free Website Review &nbsp;→
        </div>
    </div>

    <!-- Right: decorative accent -->
    <div style="position:relative;width:280px;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;">
        <svg width="260" height="420" viewBox="0 0 260 420" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Large faint circle -->
            <circle cx="160" cy="210" r="180" stroke="rgba(226,15,46,0.08)" stroke-width="1"/>
            <circle cx="160" cy="210" r="140" stroke="rgba(226,15,46,0.06)" stroke-width="1"/>
            <circle cx="160" cy="210" r="100" stroke="rgba(226,15,46,0.1)" stroke-width="1"/>
            <!-- Vertical accent lines -->
            <line x1="220" y1="80" x2="220" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <line x1="240" y1="100" x2="240" y2="320" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <line x1="260" y1="120" x2="260" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <!-- Red-orange dot accent -->
            <circle cx="160" cy="210" r="6" fill="#e20f2e" opacity="0.6"/>
            <circle cx="160" cy="210" r="3" fill="#e20f2e"/>
        </svg>
    </div>

</body>
</html>
